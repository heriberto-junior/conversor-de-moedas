name: COBOL Run (rápido, sem compilação)

on:
  workflow_dispatch:
    inputs:
      valor_brl:
        description: "Valor em BRL (ex: 123.45 ou 123,45)"
        required: true
        type: string
        default: '1.00'
      moeda_destino:
        description: "Converter para"
        required: true
        type: choice
        options: [USD, EUR, JPY, GBP, AUD, CAD]

# Permissões para ler artifacts de OUTRA execução
permissions:
  contents: read
  actions: read

env:
  COBOL_EXECUTABLE: coin
  ARTIFACT_NAME: coin-bin
  BUILD_WORKFLOW_FILE: build.yml  # <-- nome do SEU workflow de build

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório (cotacao.txt vem daqui)
        uses: actions/checkout@v4

      - name: Debug – listar workflows e caminhos
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/actions/workflows \
            | jq -r '.workflows[] | "\(.id)  \(.name)  \(.path)"'


      - name: Descobrir última execução concluída do build
        id: find
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          WF="build.yml"

          # Achar o workflow id
          wid="$(gh api repos/${{ github.repository }}/actions/workflows \
            | jq -r --arg wf "/$WF" '.workflows[] | select(.path | endswith($wf)) | .id')"
      
          echo "Workflow ID encontrado: $wid"

          # Buscar executações concluídas (success OU failure)
          rid="$(
            gh api repos/${{ github.repository }}/actions/workflows/$wid/runs \
            | jq -r '
                .workflow_runs
                | map(select(.status=="completed"))
                | sort_by(.run_number)
                | reverse
                | .[0].id // empty
              '
          )"

          if [ -z "${rid:-}" ]; then
            echo "Nenhuma execução CONCLUÍDA encontrada para o build"
            exit 1
          fi

          echo "run_id=$rid" >> "$GITHUB_OUTPUT"
